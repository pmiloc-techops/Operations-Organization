<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMILOC Operations Organization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background-color: #edeef5;
      padding: 20px;
    }

    .page-wrapper {
      max-width: 850px;
      margin: auto;
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #e1e4e8;
    }

    .page-header {
      background: linear-gradient(135deg, #4f17a9 0%, #3a0f80 100%);
      color: #ffffff;
      padding: 40px 32px;
    }

    .header-accent {
      background: #ff6110;
      height: 5px;
      width: 52px;
      margin-bottom: 20px;
      border-radius: 3px;
    }

    .page-title {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
      line-height: 1.2;
      color: #ffffff;
    }

    .page-subtitle {
      margin: 10px 0 0 0;
      font-size: 14px;
      color: #ffffff;
      opacity: 0.85;
    }

    .page-body {
      padding: 32px;
    }

    .committee-card {
      background: #F8F9FA;
      border-radius: 12px;
      border-top: 4px solid #4f17a9;
      padding: 22px;
      margin-bottom: 20px;
    }

    .committee-card:nth-child(3n+1) { border-top-color: #4f17a9; }
    .committee-card:nth-child(3n+2) { border-top-color: #0bbfe0; }
    .committee-card:nth-child(3n+3) { border-top-color: #ff6110; }

    .committee-name {
      font-size: 18px;
      font-weight: bold;
      color: #4f17a9;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #e1e4e8;
    }

    .committee-card:nth-child(3n+2) .committee-name { color: #0bbfe0; }
    .committee-card:nth-child(3n+3) .committee-name { color: #ff6110; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead tr {
      background-color: #4f17a9;
    }

    .committee-card:nth-child(3n+2) thead tr { background-color: #0bbfe0; }
    .committee-card:nth-child(3n+3) thead tr { background-color: #ff6110; }

    thead th {
      padding: 10px 12px;
      color: #ffffff;
      text-align: left;
      font-weight: bold;
      border: 1px solid rgba(255,255,255,0.2);
    }

    tbody tr {
      background: #ffffff;
    }

    tbody tr:nth-child(even) {
      background-color: #f8f9fa;
    }

    tbody td {
      padding: 10px 12px;
      border: 1px solid #e1e4e8;
      color: #333;
      line-height: 1.6;
      vertical-align: top;
    }

    td.role-cell {
      color: #555;
      width: 40%;
    }

    td.name-cell {
      font-weight: bold;
      color: #333;
    }

    .vacant {
      color: #aaa;
      font-style: italic;
      font-weight: normal;
    }

    .member-count {
      font-size: 12px;
      color: #888;
      text-align: right;
      margin-top: 10px;
    }

    .status-msg {
      color: #666;
      font-size: 14px;
      padding: 20px 0;
      text-align: center;
    }

    .error-msg {
      color: #c00;
      font-size: 14px;
      padding: 20px 0;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="page-wrapper">
    <div class="page-header">
      <div class="header-accent"></div>
      <h1 class="page-title">Operations Organization</h1>
      <p class="page-subtitle">PMI Lakeshore Chapter &mdash; Only approved entries are shown</p>
    </div>

    <div class="page-body">
      <div id="org-container">
        <p class="status-msg">Loading...</p>
      </div>
    </div>
  </div>

  <script>
    // *** ONLY LINE YOU EVER NEED TO CHANGE ***
    const FEED_URL = "https://script.google.com/macros/s/AKfycbzxv_bfhbkLBIbvIxzpMGgEnZB4VZFirkTfSY0PyvDQuj_RJWT_iAvityw3yfyApRS3dw/exec";

    fetch(FEED_URL)
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("org-container");

        if (!Array.isArray(data) || data.length === 0) {
          container.innerHTML = "<p class='status-msg'>No approved members found. Make sure the Approved column is set to yes in the sheet.</p>";
          return;
        }

        // Group by committee preserving order
        const committeeMap = {};
        const committeeOrder = [];

        data.forEach(m => {
          const committee = m.committee || "General";
          if (!committeeMap[committee]) {
            committeeMap[committee] = {};
            committeeOrder.push(committee);
          }
          const roleMap = committeeMap[committee];
          if (!roleMap[m.role]) roleMap[m.role] = [];
          if (m.name) roleMap[m.role].push(m.name);
        });

        committeeOrder.sort();

        const cards = committeeOrder.map(committeeName => {
          const roleMap = committeeMap[committeeName];
          const roles = Object.keys(roleMap);

          const rows = roles.map(role => {
            const names = roleMap[role];
            if (names.length === 0) {
              return `<tr>
                <td class="role-cell">${role}</td>
                <td class="name-cell"><span class="vacant">Vacant</span></td>
              </tr>`;
            }
            return names.map((name, i) => `<tr>
              <td class="role-cell">${i === 0 ? role : ""}</td>
              <td class="name-cell">${name}</td>
            </tr>`).join("");
          }).join("");

          const totalNames = roles.reduce((sum, r) => sum + roleMap[r].length, 0);

          return `
            <div class="committee-card">
              <div class="committee-name">${committeeName}</div>
              <table>
                <thead>
                  <tr>
                    <th>Role</th>
                    <th>Name</th>
                  </tr>
                </thead>
                <tbody>${rows}</tbody>
              </table>
              <div class="member-count">${totalNames} member${totalNames !== 1 ? "s" : ""}</div>
            </div>`;
        }).join("");

        container.innerHTML = cards;
      })
      .catch(() => {
        document.getElementById("org-container").innerHTML =
          "<p class='error-msg'>Unable to load member data. Please try again later.</p>";
      });
  </script>

</body>
</html>
