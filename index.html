<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMILOC Operations Organization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: helvetica, arial, sans-serif;
      font-size: 14px;
      color: #333;
      padding: 16px;
      background: #fff;
    }
    h2 {
      font-family: helvetica, arial, sans-serif;
      font-size: 16px;
      color: #333;
      margin: 24px 0 8px 0;
      text-decoration: underline;
      font-weight: bold;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 8px;
    }
    td {
      border: 1px solid #ccc;
      padding: 8px 10px;
      font-size: 12px;
      vertical-align: middle;
      line-height: 1.5;
    }
    td:first-child {
      width: 46%;
    }
    .role-bold td:first-child,
    .role-bold td:last-child {
      font-weight: bold;
    }
    .status-msg {
      color: #666;
      font-size: 13px;
      padding: 12px 0;
    }
    .error-msg {
      color: #c00;
      font-size: 13px;
      padding: 12px 0;
    }
  </style>
</head>
<body>
  <div id="org-container">
    <p class="status-msg">Loading...</p>
  </div>
  <script>
    // *** ONLY LINE YOU EVER NEED TO CHANGE ***
    const FEED_URL = "https://script.google.com/macros/s/AKfycbw7RnIaCP4uVKft29cnOgInR9nZ_Z-mlO8B-cP4Ew6LB76EOzH7nRYFYBflOmbykHzBvw/exec";
    fetch(FEED_URL)
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("org-container");
        if (!Array.isArray(data) || data.length === 0) {
          container.innerHTML = "<p class='status-msg'>No approved members found.</p>";
          return;
        }
        // Group by committee preserving sheet order
        const committeeMap = {};
        const committeeOrder = [];
        data.forEach(m => {
          const committee = m.committee || "General";
          if (!committeeMap[committee]) {
            committeeMap[committee] = {};
            committeeOrder.push(committee);
          }
          const roleMap = committeeMap[committee];
          if (!roleMap[m.role]) roleMap[m.role] = [];
          if (m.name) roleMap[m.role].push(m.name);
        });
        let html = "";
        committeeOrder.forEach(committeeName => {
          const roleMap = committeeMap[committeeName];
          const roles = Object.keys(roleMap);
          html += `<h2>${committeeName}</h2>`;
          html += `<table>`;
          roles.forEach((role, roleIndex) => {
            const names = roleMap[role];
            const isBold = roleIndex < 2; // Director and Portfolio Manager rows bold
            if (names.length === 0) {
              html += `<tr class="${isBold ? 'role-bold' : ''}">
                <td>&nbsp;${role}</td>
                <td><em style="color:#aaa;">Vacant</em></td>
              </tr>`;
            } else {
              // First name: role cell with rowspan
              html += `<tr class="${isBold ? 'role-bold' : ''}">
                <td rowspan="${names.length}" style="vertical-align:middle;">&nbsp;${role}</td>
                <td>&nbsp;${names[0]}</td>
              </tr>`;
              // Remaining names: just name cell
              names.slice(1).forEach(name => {
                html += `<tr class="${isBold ? 'role-bold' : ''}">
                  <td>&nbsp;${name}</td>
                </tr>`;
              });
            }
          });
          html += `</table>`;
        });
        container.innerHTML = html;
      })
      .catch(() => {
        document.getElementById("org-container").innerHTML =
          "<p class='error-msg'>Unable to load member data. Please try again later.</p>";
      });
  </script>
</body>
</html>
